{% extends "base.html" %}

{% block content %}
{% include "_top_nav.html" %}

<div class="card">
    <h2>📱 Telegram Settings</h2>
    <p style="color: #888; margin-bottom: 15px;">Add your Telegram username and user ID to link your account for Telegram voting.</p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <label>Telegram Username (optional, without @)</label>
        <input type="text" name="telegram_username" value="{{ telegram_username or '' }}" placeholder="example_user" maxlength="64">

        <label>Telegram User ID (optional)</label>
        <input type="text" name="telegram_user_id" value="{{ telegram_user_id or '' }}" placeholder="123456789">

        <button type="submit" class="btn">Save Telegram Settings</button>
    </form>
</div>
{% endblock %}
