version: '3.8'

services:
  web:
    build: .
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "false"
      FLASK_SECURE_COOKIES: "true"
      APP_DB_PATH: "/data/app.db"
      MCP_SERVER_ENABLED: "true"
      MCP_SERVER_HOST: "0.0.0.0"
      MCP_SERVER_PORT: "8765"
    volumes:
      - app_data:/data
      - uploads_data:/app/static/uploads
    ports:
      - "5000:5000"
      - "8765:8765"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  app_data:
  uploads_data:
