{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <div class="card">
        <h1 style="text-align: center;">🔧 MakeSpace Madrid</h1>
        <p style="text-align: center; color: #888; margin-bottom: 30px;">{{ 'Budget'|lang }} {{ 'Proposals'|lang }}</p>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>{{ 'Username'|lang }}</label>
            <input type="text" name="username" required autofocus>
            
            <label>{{ 'Password'|lang }}</label>
            <input type="password" name="password" required>
            
            <button type="submit" class="btn" style="width: 100%;">{{ 'Login'|lang }}</button>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #888;">
            {{ 'No account yet'|lang }} <a href="{{ url_for('register') }}" style="color: #00d9ff;">{{ 'Register'|lang }}</a>
        </p>

        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('auth.set_language', lang='en') }}" style="color: #888; font-size: 0.85em;">English</a> |
            <a href="{{ url_for('auth.set_language', lang='es') }}" style="color: #888; font-size: 0.85em;">Español</a>
        </div>
    </div>
</div>
{% endblock %}
