{% extends "base.html" %}

{% block content %}
<div class="nav">
    <a href="{{ url_for('dashboard') }}">← {{ 'Dashboard'|lang }}</a>
    <div class="lang-selector">
        <a href="{{ url_for('set_language', lang='en') }}" class="{{ 'active' if session_lang == 'en' else '' }}">EN</a>
        <a href="{{ url_for('set_language', lang='es') }}" class="{{ 'active' if session_lang == 'es' else '' }}">ES</a>
    </div>
</div>

<div style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h2>{{ 'Password'|lang }}</h2>
        
        <form method="POST">
            <label>Current Password</label>
            <input type="password" name="current_password" required autofocus>
            
            <label>New Password</label>
            <input type="password" name="new_password" required>
            
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>
            
            <button type="submit" class="btn" style="width: 100%;">Change Password</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('dashboard') }}" style="color: #00d9ff;">← Back to Dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
