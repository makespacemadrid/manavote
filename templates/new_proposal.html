{% extends "base.html" %}

{% block content %}
<div class="nav">
    <a href="{{ url_for('dashboard') }}">← {{ 'Dashboard'|lang }}</a>
    <div class="lang-selector">
        <a href="{{ url_for('set_language', lang='en') }}" class="{{ 'active' if session_lang == 'en' else '' }}">EN</a>
        <a href="{{ url_for('set_language', lang='es') }}" class="{{ 'active' if session_lang == 'es' else '' }}">ES</a>
    </div>
</div>

<div class="card">
    <h2>Create New Proposal</h2>
    
    <p style="color: #888; margin-bottom: 20px;">
        Available budget: <strong>€{{ "%.2f"|format(current_budget) }}</strong>
    </p>
    
    <form method="POST" enctype="multipart/form-data">
        <label>Title</label>
        <input type="text" name="title" placeholder="e.g., Buy new soldering station" required>
        
        <label>Description</label>
        <textarea name="description" placeholder="Describe what the money will be used for..."></textarea>
        
        <label>Amount (EUR)</label>
        <input type="number" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
        
        <label>URL (optional)</label>
        <input type="url" name="url" placeholder="https://example.com/product">
        
        <label>Image (optional, JPG/PNG only)</label>
        <input type="file" name="image" accept=".jpg,.jpeg,.png">
        
        <label style="margin-top: 10px; display: block;">Basic supplies ({{ thresholds.basic }}% backers required)</label>
        <div style="margin-bottom: 15px; text-align: left;">
            <input type="checkbox" name="basic_supplies" value="1" style="width: auto !important; margin-left: 0;">
        </div>
        
        <button type="submit" class="btn">Submit Proposal</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
