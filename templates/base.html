<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <title>MakeSpace Madrid Budget Voting</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1, h2, h3 { margin-bottom: 15px; text-align: left; }
        h1 { color: #00d9ff; }
        .card { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #0f3460; }
        .btn { display: inline-block; padding: 10px 20px; background: #e94560; color: white; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #ff6b6b; }
        .btn-secondary { background: #0f3460; }
        .btn-secondary:hover { background: #1a4a7a; }
        .btn-success { background: #00d9ff; color: #1a1a2e; }
        .btn-success:hover { background: #00b8d9; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #0f3460; border: 1px solid #1a4a7a; color: #eee; border-radius: 4px; }
        textarea { min-height: 100px; resize: vertical; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        .flash { padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; }
        .flash.success { background: #00d9ff22; color: #00d9ff; border: 1px solid #00d9ff; }
        .flash.error { background: #e9456022; color: #e94560; border: 1px solid #e94560; }
        .budget { font-size: 2.5em; color: #00d9ff; font-weight: bold; }
        .proposal-list { list-style: none; }
        .proposal-item { display: flex; padding: 15px; background: #0f3460; border-radius: 6px; margin-bottom: 10px; }
        .proposal-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .title-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .title-row a { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #eee; text-decoration: none; }
        .tags-right { display: flex; gap: 5px; flex-shrink: 0; }
        .proposal-info h3 { margin: 0 0 5px 0; font-size: 1.1em; }
        .proposal-meta { color: #888; font-size: 0.85em; }
        .proposal-amount { font-size: 1.3em; color: #e94560; font-weight: bold; }
        .vote-counts { display: flex; gap: 15px; font-size: 0.85em; }
        .vote-approve { color: #00d9ff; }
        .vote-reject { color: #e94560; }
        .status { padding: 4px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-active { background: #00d9ff22; color: #00d9ff; }
        .status-approved { background: #00ff8822; color: #00ff88; }
        .status-rejected { background: #e9456022; color: #e94560; }
        .status-over-budget { background: #ffa50022; color: #ffa500; }
        .vote-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .vote-btn { flex: 1; padding: 8px; border: 2px solid; border-radius: 4px; background: transparent; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; display: inline-block; }
        .vote-btn:hover { opacity: 0.8; }
        .vote-btn.approve { border-color: #00d9ff; color: #00d9ff; }
        .vote-btn.approve:hover, .vote-btn.approve.active { background: #00d9ff; color: #1a1a2e; }
        .vote-btn.reject { border-color: #e94560; color: #e94560; }
        .vote-btn.reject:hover, .vote-btn.reject.active { background: #e94560; color: white; }
        .nav { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #0f3460; }
        .nav-header { display: contents; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 15px; }
        .nav a { color: #00d9ff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .nav-toggle { display: none; margin-left: auto; background: #0f3460; color: #00d9ff; border: 1px solid #1a4a7a; border-radius: 4px; padding: 4px 10px; font-size: 1.1em; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #888; }
        .amount-positive { color: #00ff88; }
        .amount-negative { color: #e94560; }
        .lang-selector { display: flex; gap: 8px; margin-left: auto; }
        .lang-selector a { opacity: 0.6; font-size: 0.85em; }
        .lang-selector a.active { opacity: 1; font-weight: bold; }
        .settings-dropdown { position: relative; margin-left: auto; }
        .settings-menu { display: none; position: absolute; right: 0; top: 20px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; padding: 10px; min-width: 150px; z-index: 100; }
        .settings-dropdown:hover .settings-menu { display: block; }
        .settings-menu a { display: block; padding: 5px 10px; color: #00d9ff; text-decoration: none; }
        .settings-menu a:hover { background: #0f3460; }
        @media (max-width: 600px) {
            .nav { display: block; }
            .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
            .nav-toggle { display: inline-block; }
            .nav-links { display: none; flex-direction: column; gap: 10px; }
            .nav.mobile-open .nav-links { display: flex; }
            .proposal-item { flex-direction: column; }
            .proposal-info { width: 100%; }
            .proposal-info > div:first-child { margin: 10px auto; text-align: center; }
            .proposal-item > div:last-child { margin-top: 10px; width: 100%; text-align: center; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            div[style*="gap: 20px"][style*="margin-bottom: 15px"] { overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('[data-mobile-nav]').forEach(function (nav) {
                var toggle = nav.querySelector('[data-nav-toggle]');
                if (!toggle) return;
                toggle.addEventListener('click', function () {
                    var isOpen = nav.classList.toggle('mobile-open');
                    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                });
            });
        });
    </script>
</body>
</html>
