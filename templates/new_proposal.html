{% extends "base.html" %}

{% block content %}
<div class="nav">
    <a href="{{ url_for('dashboard') }}">← {{ 'Dashboard'|lang }}</a>
    <div class="lang-selector">
        <a href="{{ url_for('set_language', lang='en') }}" class="{{ 'active' if session_lang == 'en' else '' }}">EN</a>
        <a href="{{ url_for('set_language', lang='es') }}" class="{{ 'active' if session_lang == 'es' else '' }}">ES</a>
    </div>
</div>

<div class="card">
    <h2>{{ 'New Proposal'|lang }}</h2>
    
    <p style="color: #888; margin-bottom: 20px;">
        {{ 'Budget'|lang }}: <strong>€{{ "%.2f"|format(current_budget) }}</strong>
    </p>
    
    <form method="POST" enctype="multipart/form-data">
        <label>{{ 'Title'|lang }}</label>
        <input type="text" name="title" placeholder="{{ 'Title placeholder'|lang }}" required>
        
        <label>{{ 'Description'|lang }}</label>
        <textarea name="description" placeholder="{{ 'Description placeholder'|lang }}"></textarea>
        
        <label>{{ 'Amount'|lang }} (EUR)</label>
        <input type="number" name="amount" step="0.01" min="0.01" placeholder="{{ 'Amount placeholder'|lang }}" required>
        
        <label>URL (optional)</label>
        <input type="url" name="url" placeholder="https://example.com/product">
        
        <label>{{ 'Image optional JPG PNG only'|lang }}</label>
        <input type="file" name="image" accept=".jpg,.jpeg,.png">
        
        <label style="margin-top: 10px; display: block;">{{ 'Basic'|lang }} supplies ({{ thresholds.basic }}% backers required)</label>
        <div style="margin-bottom: 15px; text-align: left;">
            <input type="checkbox" name="basic_supplies" value="1" style="width: auto !important; margin-left: 0;">
        </div>
        
        <button type="submit" class="btn">{{ 'Submit Proposal'|lang }}</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">{{ 'Cancel'|lang }}</a>
    </form>
</div>
{% endblock %}
