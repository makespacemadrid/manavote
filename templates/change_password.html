{% extends "base.html" %}

{% block content %}
{% include "_top_nav.html" %}

    <div style="max-width: 400px; margin: 50px auto;">
        <div class="card">
            <h2>{{ 'Change Password'|lang }}</h2>
            
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <label>{{ 'New Password'|lang }}</label>
                <input type="password" name="new_password" required autofocus>
                
                <label>{{ 'Confirm New Password'|lang }}</label>
                <input type="password" name="confirm_password" required>
                
                <button type="submit" class="btn" style="width: 100%;">{{ 'Change Password'|lang }}</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="{{ url_for('dashboard') }}" style="color: #00d9ff;">← {{ 'Dashboard'|lang }}</a>
            </p>
        </div>
    </div>
{% endblock %}
